<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TimeLoop</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="logo">◷</div>
      <strong>TimeLoop</strong>
      <span id="status">Not configured</span>
    </header>

    <nav>
      <button class="active" data-tab="config">Config</button>
      <button data-tab="history">History</button>
      <button data-tab="debug">Debug</button>
    </nav>

    <section id="config" class="tab">
      <label>TimeLoop API URL</label>
      <input id="apiBase" placeholder="http://localhost:3000" />
      <label>Your User ID</label>
      <input id="userId" placeholder="Paste User ID from dashboard" />
      <button id="save">Save Configuration</button>
      <button id="sync">Sync Now</button>
      <p id="message" class="muted"></p>
    </section>

    <section id="history" class="tab hidden">
      <div id="summary"></div>
      <div id="historyList"></div>
    </section>

    <section id="debug" class="tab hidden">
      <pre id="debug"></pre>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
